<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification – SmartPark</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card otp-card">

    <div class="auth-logo text-only">SmartPark</div>

    <h1>🔐 Email Verification</h1>
    <p class="auth-subtitle">
      Didn't create account via registration? Use this page to verify your email with OTP.
    </p>

    <!-- STEP 1 -->
    <div class="section-title">📧 Step 1: Request OTP</div>
    <div id="sendMsg" class="message"></div>

    <form id="sendOtpForm">
      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input id="sendEmail" type="email" placeholder="you@example.com" required autocomplete="email">
        <div class="small">OTP will be sent here</div>
      </div>
      <button type="submit" class="btn-full">Send OTP</button>
    </form>

    <div class="divider"></div>

    <!-- STEP 2 -->
    <div class="section-title">✅ Step 2: Enter & Verify</div>
    <div id="verifyMsg" class="message"></div>

    <form id="verifyOtpForm">
      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input id="verifyEmail" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>6-Digit OTP <span class="required">*</span></label>
        <input id="code" class="otp-input"
               placeholder="123456"
               maxlength="6"
               pattern="[0-9]{6}"
               inputmode="numeric"
               required>
        <div class="small">Check your inbox (or spam folder)</div>
      </div>

      <button type="submit" class="btn-full">
        Verify Email →
      </button>
    </form>

    <div class="auth-footer">
      <a href="/login">← Back to Login</a>
    </div>

  </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>

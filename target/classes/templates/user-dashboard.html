<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard – SmartPark</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="/" class="topbar-brand">
    SmartPark
  </a>

  <div class="topbar-nav">
    <span id="currentUser" class="topbar-user"></span>
    <a href="/parking-list" class="btn btn-secondary btn-sm">Browse Slots</a>
    <button id="logoutBtn" class="btn btn-danger btn-sm" type="button">Logout</button>
  </div>
</div>

<div class="container">

  <div id="msg" class="message"></div>

  <!-- Profile Section -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <div class="card-icon">👤</div>
        My Profile
      </div>
    </div>

    <form id="profileForm">
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input id="profileName" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input id="profileContact" type="tel" placeholder="+91 9876543210">
        <div class="small">For owner communication</div>
      </div>

      <div class="form-group">
        <label>New Password <span class="small">(optional)</span></label>
        <input id="profilePassword" type="password" placeholder="Min 6 characters" minlength="6">
        <div class="small">Leave blank to keep current password</div>
      </div>

      <button type="submit" class="btn-full">💾 Save Changes</button>
    </form>
  </div>

  <!-- My Bookings Section -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <div class="card-icon">📋</div>
        My Bookings
      </div>
      <button type="button" class="btn btn-secondary btn-sm" onclick="loadUserBookings()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Slot</th>
          <th>Price</th>
          <th>Start</th>
          <th>End</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody id="bookingsBody">
        <tr>
          <td colspan="7" style="text-align:center;color:var(--muted);padding:24px">
            Loading…
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="/js/main.js"></script>

</body>
</html>

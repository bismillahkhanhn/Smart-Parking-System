# To use MySQL instead of H2:
# 1. Create database: CREATE DATABASE smart_parking;
# 2. Run IntelliJ with VM option: -Dspring.profiles.active=mysql
# 3. Set your password below or use env vars DB_USER / DB_PASSWORD
spring.datasource.url=jdbc:mysql://localhost:3306/smart_parking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:bismi@786}
spring.h2.console.enabled=false

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartPark – Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card blue-theme">

    <div class="auth-logo text-only">
      SmartPark
    </div>

    <h1>Welcome Back</h1>
    <p class="auth-subtitle">Sign in to your SmartPark account</p>

    <div id="msg" class="message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address <span class="required">*</span></label>
        <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <input id="password" type="password" placeholder="Your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-full">Sign In →</button>
    </form>

    <div class="auth-footer">
      Don’t have an account? <a href="/register">Create Account</a>
    </div>

  </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
